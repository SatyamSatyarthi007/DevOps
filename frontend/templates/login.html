<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassOS — Sign In</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; overflow-x: hidden; }
    .mesh-bg { background: #0a0a1a; position: relative; overflow: hidden; }
    .mesh-bg::before { content: ''; position: absolute; top: -30%; left: -20%; width: 70%; height: 70%; background: radial-gradient(ellipse, rgba(120,80,255,0.35) 0%, transparent 70%); animation: float1 12s ease-in-out infinite; }
    .mesh-bg::after { content: ''; position: absolute; bottom: -20%; right: -20%; width: 65%; height: 65%; background: radial-gradient(ellipse, rgba(0,180,220,0.3) 0%, transparent 70%); animation: float2 15s ease-in-out infinite; }
    .orb-pink { position: absolute; top: 50%; left: 60%; width: 50%; height: 50%; background: radial-gradient(ellipse, rgba(255,60,120,0.25) 0%, transparent 70%); animation: float3 18s ease-in-out infinite; pointer-events: none; }
    @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(15%,10%) scale(1.1); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-10%,-15%) scale(1.15); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20%,10%) scale(0.9); } }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1); }
    .glass-input { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; transition: all 0.3s ease; }
    .glass-input:focus { outline: none; border-color: rgba(120,80,255,0.5); box-shadow: 0 0 0 3px rgba(120,80,255,0.15); background: rgba(255,255,255,0.1); }
    .glass-input::placeholder { color: rgba(255,255,255,0.35); }
    .btn-primary { background: linear-gradient(135deg,#7850ff,#5a30e0); color: #fff; border: none; transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94); box-shadow: 0 4px 15px rgba(120,80,255,0.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(120,80,255,0.45); }
    .tab-active { background: rgba(120,80,255,0.2); color: #fff; border-color: rgba(120,80,255,0.3) !important; }
    .error-box { background: rgba(255,60,120,0.1); border: 1px solid rgba(255,60,120,0.3); color: #ff3c78; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
  </style>
</head>
<body class="mesh-bg h-full">
  <div class="orb-pink"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div class="glass" style="border-radius:24px;width:100%;max-width:420px;padding:40px 36px;">

      <!-- Brand -->
      <div style="text-align:center;margin-bottom:32px;">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#7850ff,#00b4dc);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;">
          <i data-lucide="hexagon" style="width:28px;height:28px;color:#fff;"></i>
        </div>
        <h1 style="font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;">GlassOS</h1>
        <p style="font-size:13px;color:rgba(255,255,255,0.45);margin-top:4px;">Your personal workspace</p>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:4px;padding:4px;background:rgba(255,255,255,0.04);border-radius:12px;margin-bottom:28px;">
        <a href="/login" class="tab-active" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer;text-align:center;text-decoration:none;color:#fff;">Sign In</a>
        <a href="/register" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,0.5);border:1px solid transparent;cursor:pointer;text-align:center;text-decoration:none;">Sign Up</a>
      </div>

      {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

      <form method="POST">
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:6px;letter-spacing:0.3px;">EMAIL</label>
          <div style="position:relative;">
            <i data-lucide="mail" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(255,255,255,0.3);"></i>
            <input type="email" name="email" placeholder="you@example.com" class="glass-input" style="width:100%;padding:12px 14px 12px 42px;border-radius:12px;font-size:14px;" required>
          </div>
        </div>
        <div style="margin-bottom:24px;">
          <label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:6px;letter-spacing:0.3px;">PASSWORD</label>
          <div style="position:relative;">
            <i data-lucide="lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(255,255,255,0.3);"></i>
            <input type="password" name="password" placeholder="••••••••" class="glass-input" style="width:100%;padding:12px 14px 12px 42px;border-radius:12px;font-size:14px;" required>
          </div>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.3px;">Sign In</button>
      </form>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
