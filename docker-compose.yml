services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: flask_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d flask_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./frontend
    container_name: flask_app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: flask_db
      DB_USER: myuser
      DB_PASSWORD: mypassword
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
